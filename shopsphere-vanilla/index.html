<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ShopSphere - Demo Frontend</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>ShopSphere Demo</h1>
    <p class="muted">Frontend static demo. Update API endpoint in <code>script.js</code> if needed.</p>
  </header>

  <main>
    <section class="controls">
      <input id="search" placeholder="Search products" />
      <button id="refresh">Refresh</button>
      <span id="status"></span>
    </section>

    <section id="products">
      <ul id="product-list"></ul>
    </section>
  </main>

  <footer>
    <small>Run a local static server: <code>python -m http.server 5500</code></small>
  </footer>

  <script src="script.js"></script>
</body>
</html>
